services:
  - type: web
    name: bookvault-backend
    runtime: dotnet
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/backend.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
